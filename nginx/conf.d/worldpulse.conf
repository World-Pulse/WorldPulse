# ─────────────────────────────────────────────────────────────────────────────
#  WorldPulse — nginx virtual hosts
#  Server:  142.93.71.102
#  Domains: world-pulse.io (canonical)  |  world-pulse.app → 301 → world-pulse.io
#  API:     api.world-pulse.io
#
#  Cert paths:
#    /etc/letsencrypt/live/world-pulse.io/   — covers .io + www.io + api.io
#    /etc/letsencrypt/live/world-pulse.app/  — covers .app + www.app
# ─────────────────────────────────────────────────────────────────────────────

# ─── HTTP — ACME challenge passthrough + HTTPS redirect ──────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name world-pulse.io
                www.world-pulse.io
                api.world-pulse.io
                world-pulse.app
                www.world-pulse.app;

    # Let's Encrypt ACME challenge (served from Docker volume)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── world-pulse.app + www → canonical world-pulse.io redirect ───────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name world-pulse.app www.world-pulse.app;

    ssl_certificate     /etc/letsencrypt/live/world-pulse.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/world-pulse.app/privkey.pem;

    # Permanent redirect — all traffic to the canonical .io domain
    return 301 https://world-pulse.io$request_uri;
}

# ─── www.world-pulse.io → apex redirect ──────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name www.world-pulse.io;

    ssl_certificate     /etc/letsencrypt/live/world-pulse.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/world-pulse.io/privkey.pem;

    return 301 https://world-pulse.io$request_uri;
}

# ─── FRONTEND — world-pulse.io ───────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name world-pulse.io;

    ssl_certificate     /etc/letsencrypt/live/world-pulse.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/world-pulse.io/privkey.pem;

    client_max_body_size 55M;
    limit_conn conn_limit 50;

    # Canonical header — tells crawlers this is the real URL
    add_header Link '<https://world-pulse.io>; rel="canonical"' always;

    # ── Static uploads — served directly from shared Docker volume ────────────
    location /uploads/ {
        alias   /var/www/uploads/;
        expires 1d;
        add_header Cache-Control    "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        autoindex off;
        try_files $uri =404;
    }

    # ── Next.js static bundle — aggressively cached ──────────────────────────
    location /_next/static/ {
        proxy_pass http://worldpulse_web;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Next.js image optimisation ───────────────────────────────────────────
    location /_next/image {
        proxy_pass         http://worldpulse_web;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Health check (no access log noise) ───────────────────────────────────
    location = /health {
        access_log off;
        proxy_pass       http://worldpulse_web;
        proxy_set_header Host $host;
    }

    # ── Main app ─────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://worldpulse_web;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;
    }
}

# ─── API — api.world-pulse.io ────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name api.world-pulse.io;

    ssl_certificate     /etc/letsencrypt/live/world-pulse.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/world-pulse.io/privkey.pem;

    client_max_body_size 55M;
    limit_conn conn_limit 100;

    # ── Auth — strict rate limit ──────────────────────────────────────────────
    location ~ ^/api/v1/auth/(login|register|forgot-password) {
        limit_req        zone=auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://worldpulse_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── File uploads ──────────────────────────────────────────────────────────
    location /api/v1/uploads {
        limit_req        zone=uploads burst=5 nodelay;

        proxy_pass         http://worldpulse_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── WebSocket ─────────────────────────────────────────────────────────────
    location /ws {
        proxy_pass            http://worldpulse_api;
        proxy_http_version    1.1;
        proxy_set_header      Upgrade           $http_upgrade;
        proxy_set_header      Connection        "upgrade";
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location = /health {
        access_log off;
        proxy_pass       http://worldpulse_api;
        proxy_set_header Host $host;
    }

    # ── General API ───────────────────────────────────────────────────────────
    location / {
        limit_req        zone=api burst=50 nodelay;
        limit_req_status 429;

        proxy_pass         http://worldpulse_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $http_connection;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      16 8k;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
