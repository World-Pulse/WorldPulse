version: "3.9"

services:
  # ─── DATABASES ───────────────────────────────────────────
  postgres:
    build:
      context: ./infrastructure/docker/postgres
      dockerfile: Dockerfile
    image: worldpulse-postgres:latest
    container_name: wp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: worldpulse_db
      POSTGRES_USER: wp_user
      POSTGRES_PASSWORD: wp_secret_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wp_user -d worldpulse_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: wp_redis
    restart: unless-stopped
    command: redis-server --requirepass wp_redis_local --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "wp_redis_local", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: wp_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: wp_meili_local_key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

  # ─── MESSAGE QUEUE ────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: wp_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: wp_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: wp_kafka_ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: worldpulse
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ─── APPLICATIONS ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: wp_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    env_file:
      - path: .env.prod
        required: false
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:-postgresql://wp_user:wp_secret_local@postgres:5432/worldpulse_db?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://:wp_redis_local@redis:6379}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:29092}
      MEILI_HOST: ${MEILI_HOST:-http://meilisearch:7700}
      MEILI_KEY: ${MEILI_KEY:-wp_meili_local_key}
      CLICKHOUSE_URL: ${CLICKHOUSE_URL:-http://clickhouse:8123}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-worldpulse}
      JWT_SECRET: ${JWT_SECRET:-wp_jwt_secret_local_change_in_prod}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://world-pulse.io}
      # AI / vector search keys are injected via env_file (.env.prod on server)
      # Do NOT add them here with ${VAR:-} defaults — that overrides env_file with empty strings
    networks:
      default:
        aliases:
          - api
      wp_net:
        aliases:
          - api

  scraper:
    build:
      context: .
      dockerfile: apps/scraper/Dockerfile
    container_name: wp_scraper
    restart: always
    labels:
      autoheal: "true"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:29092}
      REDIS_URL: ${REDIS_URL:-redis://:wp_redis_local@redis:6379}
      DATABASE_URL: ${DATABASE_URL:-postgresql://wp_user:wp_secret_local@postgres:5432/worldpulse_db?sslmode=disable}
      SCRAPE_INTERVAL_MS: 30000
      LOG_LEVEL: debug
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      default:
        aliases:
          - scraper

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.world-pulse.io
        NEXT_PUBLIC_WS_URL: wss://api.world-pulse.io
        NEXT_PUBLIC_MEILI_HOST: https://api.world-pulse.io/search
    container_name: wp_web
    restart: always
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      HOSTNAME: "0.0.0.0"
      # Internal Docker network URL for server-side Next.js fetches.
      # Avoids the web container making loopback HTTPS requests through nginx
      # to reach the API — those can silently fail and cause 404s on signal detail pages.
      API_URL: http://wp_api:3001
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 60s
      timeout: 15s
      start_period: 120s
      retries: 5
    labels:
      autoheal: "true"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      default:
        aliases:
          - web
      wp_net:
        aliases:
          - web

  # ─── AUTOHEAL ─────────────────────────────────────────────
  # Monitors all containers labelled autoheal=true and restarts
  # them automatically when Docker marks them (unhealthy).
  # Prevents wp_web memory-freeze 504s without manual intervention.
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: wp_autoheal
    restart: always
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 10
      AUTOHEAL_START_PERIOD: 120
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # ─── ANALYTICS ────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: wp_clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # native
    environment:
      CLICKHOUSE_DB: worldpulse
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── MONITORING ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: wp_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infrastructure/docker/prometheus/rules:/etc/prometheus/rules
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: wp_grafana
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/docker/grafana/provisioning:/etc/grafana/provisioning
      - ./infrastructure/docker/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  meili_data:
  kafka_data:
  zookeeper_data:
  prometheus_data:
  grafana_data:
  clickhouse_data:

networks:
  wp_net:
    external: true
    name: worldpulse_wp_net
