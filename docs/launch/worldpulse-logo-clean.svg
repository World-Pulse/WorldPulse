<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d1f3c"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="50%" style="stop-color:#00e5b8"/>
      <stop offset="100%" style="stop-color:#00d4aa"/>
    </linearGradient>
    <linearGradient id="globe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#0f2740"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5b8" stop-opacity="0.3"/>
      <stop offset="100%" style="stop-color:#00d4aa" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Subtle glow behind globe -->
  <circle cx="256" cy="256" r="175" fill="url(#glow)"/>

  <!-- Globe body -->
  <circle cx="256" cy="256" r="150" fill="url(#globe)" stroke="#00d4aa" stroke-width="2.5" stroke-opacity="0.4"/>

  <!-- Globe latitude lines -->
  <ellipse cx="256" cy="256" rx="150" ry="52" fill="none" stroke="#00d4aa" stroke-width="1.2" stroke-opacity="0.2"/>
  <ellipse cx="256" cy="192" rx="128" ry="40" fill="none" stroke="#00d4aa" stroke-width="1" stroke-opacity="0.15"/>
  <ellipse cx="256" cy="320" rx="128" ry="40" fill="none" stroke="#00d4aa" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Globe longitude lines -->
  <ellipse cx="256" cy="256" rx="55" ry="150" fill="none" stroke="#00d4aa" stroke-width="1.2" stroke-opacity="0.2"/>
  <ellipse cx="256" cy="256" rx="108" ry="150" fill="none" stroke="#00d4aa" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Globe center lines -->
  <line x1="256" y1="106" x2="256" y2="406" stroke="#00d4aa" stroke-width="1" stroke-opacity="0.15"/>
  <line x1="106" y1="256" x2="406" y2="256" stroke="#00d4aa" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Signal dots on globe -->
  <circle cx="205" cy="215" r="6" fill="#00e5b8" opacity="0.9"/>
  <circle cx="205" cy="215" r="12" fill="#00e5b8" opacity="0.2"/>

  <circle cx="300" cy="235" r="5" fill="#ff6b6b" opacity="0.9"/>
  <circle cx="300" cy="235" r="10" fill="#ff6b6b" opacity="0.2"/>

  <circle cx="235" cy="290" r="5.5" fill="#00e5b8" opacity="0.8"/>
  <circle cx="235" cy="290" r="11" fill="#00e5b8" opacity="0.15"/>

  <circle cx="320" cy="195" r="4.5" fill="#ffd93d" opacity="0.9"/>
  <circle cx="320" cy="195" r="9" fill="#ffd93d" opacity="0.2"/>

  <circle cx="185" cy="265" r="4" fill="#ff6b6b" opacity="0.7"/>
  <circle cx="285" cy="310" r="4" fill="#00e5b8" opacity="0.7"/>
  <circle cx="335" cy="275" r="3.5" fill="#ffd93d" opacity="0.6"/>

  <!-- Pulse/heartbeat line across the globe -->
  <polyline
    points="60,256 145,256 175,256 195,215 212,300 230,238 248,275 256,190 268,320 285,242 300,268 318,256 355,256 452,256"
    fill="none"
    stroke="url(#pulse)"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.95"
  />

  <!-- Brighter pulse glow -->
  <polyline
    points="60,256 145,256 175,256 195,215 212,300 230,238 248,275 256,190 268,320 285,242 300,268 318,256 355,256 452,256"
    fill="none"
    stroke="#00e5b8"
    stroke-width="10"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.15"
  />
</svg>
