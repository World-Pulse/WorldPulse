<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="subtleGlow" cx="50%" cy="44%" r="40%">
      <stop offset="0%" style="stop-color:#00e676" stop-opacity="0.05"/>
      <stop offset="100%" style="stop-color:#00e676" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background — rounded square like app icon -->
  <rect width="512" height="512" rx="96" ry="96" fill="#06070d"/>
  <rect width="512" height="512" rx="96" ry="96" fill="url(#subtleGlow)"/>

  <!-- Globe — thin, understated -->
  <circle cx="256" cy="226" r="120" fill="none" stroke="#e2e6f0" stroke-width="1.5" stroke-opacity="0.2"/>

  <!-- Latitude -->
  <ellipse cx="256" cy="226" rx="120" ry="40" fill="none" stroke="#e2e6f0" stroke-width="1" stroke-opacity="0.12"/>
  <ellipse cx="256" cy="178" rx="100" ry="28" fill="none" stroke="#e2e6f0" stroke-width="0.8" stroke-opacity="0.08"/>
  <ellipse cx="256" cy="274" rx="100" ry="28" fill="none" stroke="#e2e6f0" stroke-width="0.8" stroke-opacity="0.08"/>

  <!-- Longitude -->
  <ellipse cx="256" cy="226" rx="44" ry="120" fill="none" stroke="#e2e6f0" stroke-width="1" stroke-opacity="0.12"/>
  <ellipse cx="256" cy="226" rx="86" ry="120" fill="none" stroke="#e2e6f0" stroke-width="0.8" stroke-opacity="0.08"/>

  <!-- Pulse line — the signature element, green -->
  <polyline
    points="116,226 174,226 196,226 210,196 222,254 234,216 244,240 256,182 268,270 280,214 292,242 306,226 338,226 396,226"
    fill="none"
    stroke="#00e676"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.85"
  />

  <!-- Wordmark -->
  <text x="256" y="410" text-anchor="middle" font-family="'Helvetica Neue', 'Arial', sans-serif" font-weight="500" font-size="36" fill="#e2e6f0" letter-spacing="8">WORLDPULSE</text>
</svg>
