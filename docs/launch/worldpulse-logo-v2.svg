<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0f18"/>
      <stop offset="100%" style="stop-color:#06070d"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e676" stop-opacity="0.6"/>
      <stop offset="30%" style="stop-color:#00e676"/>
      <stop offset="70%" style="stop-color:#00e676"/>
      <stop offset="100%" style="stop-color:#00e676" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="globe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141722"/>
      <stop offset="100%" style="stop-color:#0d0f18"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00e676" stop-opacity="0.12"/>
      <stop offset="100%" style="stop-color:#00e676" stop-opacity="0"/>
    </radialGradient>
    <filter id="pulseGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Outer ring (surface3 border) -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#1b2030" stroke-width="1.5"/>

  <!-- Glow behind globe -->
  <circle cx="256" cy="256" r="170" fill="url(#glow)"/>

  <!-- Globe body -->
  <circle cx="256" cy="256" r="148" fill="url(#globe)" stroke="#00e676" stroke-width="1.8" stroke-opacity="0.25"/>

  <!-- Globe latitude lines using wp-green -->
  <ellipse cx="256" cy="256" rx="148" ry="50" fill="none" stroke="#00e676" stroke-width="0.9" stroke-opacity="0.15"/>
  <ellipse cx="256" cy="193" rx="126" ry="38" fill="none" stroke="#00e676" stroke-width="0.7" stroke-opacity="0.1"/>
  <ellipse cx="256" cy="319" rx="126" ry="38" fill="none" stroke="#00e676" stroke-width="0.7" stroke-opacity="0.1"/>

  <!-- Globe longitude lines -->
  <ellipse cx="256" cy="256" rx="54" ry="148" fill="none" stroke="#00e676" stroke-width="0.9" stroke-opacity="0.15"/>
  <ellipse cx="256" cy="256" rx="106" ry="148" fill="none" stroke="#00e676" stroke-width="0.7" stroke-opacity="0.1"/>

  <!-- Globe axis lines -->
  <line x1="256" y1="108" x2="256" y2="404" stroke="#00e676" stroke-width="0.7" stroke-opacity="0.1"/>
  <line x1="108" y1="256" x2="404" y2="256" stroke="#00e676" stroke-width="0.7" stroke-opacity="0.1"/>

  <!-- Signal dots — using exact wp colors -->
  <!-- Green signals (wp-green #00e676) -->
  <circle cx="206" cy="212" r="5.5" fill="#00e676" opacity="0.9"/>
  <circle cx="206" cy="212" r="11" fill="#00e676" opacity="0.12"/>

  <circle cx="238" cy="292" r="5" fill="#00e676" opacity="0.75"/>
  <circle cx="238" cy="292" r="10" fill="#00e676" opacity="0.1"/>

  <circle cx="288" cy="312" r="4" fill="#00e676" opacity="0.6"/>

  <!-- Red signals (wp-red #ff3b5c) -->
  <circle cx="298" cy="232" r="5" fill="#ff3b5c" opacity="0.9"/>
  <circle cx="298" cy="232" r="10" fill="#ff3b5c" opacity="0.12"/>

  <circle cx="186" cy="268" r="3.5" fill="#ff3b5c" opacity="0.7"/>

  <!-- Amber signals (wp-amber #f5a623) -->
  <circle cx="322" cy="198" r="4.5" fill="#f5a623" opacity="0.85"/>
  <circle cx="322" cy="198" r="9" fill="#f5a623" opacity="0.12"/>

  <circle cx="332" cy="272" r="3.5" fill="#f5a623" opacity="0.6"/>

  <!-- Cyan signal (wp-cyan #00d4ff) -->
  <circle cx="270" cy="178" r="3.5" fill="#00d4ff" opacity="0.7"/>
  <circle cx="270" cy="178" r="7" fill="#00d4ff" opacity="0.1"/>

  <!-- Pulse/heartbeat line — wp-green -->
  <polyline
    points="62,256 148,256 178,256 196,212 214,302 232,236 250,278 256,188 270,318 288,240 302,270 320,256 358,256 450,256"
    fill="none"
    stroke="#00e676"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.9"
    filter="url(#pulseGlow)"
  />
</svg>
