name: New Intelligence Source
description: Propose a new data source for the scraper pipeline
title: "[Source]: "
labels: ["source-request", "enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Help us expand WorldPulse's coverage! Propose a new intelligence source.
  - type: input
    id: source_name
    attributes:
      label: Source name
      placeholder: "e.g., ACLED, NOAA Storm Events, FlightRadar24"
    validations:
      required: true
  - type: input
    id: source_url
    attributes:
      label: Source URL or API endpoint
      placeholder: "https://..."
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Conflict / Security
        - Natural Hazards
        - Health / Disease
        - Economic / Markets
        - Cyber / Digital
        - Maritime / Aviation
        - Space / Weather
        - Human Rights / Governance
        - Environment / Climate
        - Other
    validations:
      required: true
  - type: dropdown
    id: format
    attributes:
      label: Data format
      options:
        - RSS / Atom feed
        - REST API (JSON)
        - CSV / flat file
        - Web scrape required
        - Other
    validations:
      required: true
  - type: textarea
    id: coverage
    attributes:
      label: Geographic coverage
      description: What regions does this source cover?
      placeholder: "Global, US-only, Europe, etc."
  - type: textarea
    id: why
    attributes:
      label: Why this source?
      description: What gap does it fill? Why is it valuable?
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Rate limits, auth requirements, terms of use, etc.
