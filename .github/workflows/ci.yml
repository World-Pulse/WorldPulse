name: WorldPulse CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/worldpulse

jobs:
  # ─── LINT & TYPE CHECK ─────────────────────────────────────────────────
  lint:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v4
      with:
        version: 9
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: pnpm
    - run: pnpm install --frozen-lockfile
    - run: pnpm turbo lint
    - run: pnpm turbo build --dry

  # ─── TESTS ─────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: worldpulse_test
          POSTGRES_USER: wp_user
          POSTGRES_PASSWORD: wp_test
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v4
      with: { version: 9 }
    - uses: actions/setup-node@v4
      with: { node-version: 20, cache: pnpm }
    - run: pnpm install --frozen-lockfile
    - run: pnpm turbo test
      env:
        DATABASE_URL: postgresql://wp_user:wp_test@localhost:5432/worldpulse_test
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: test_secret_not_for_prod

  # ─── BUILD & PUSH IMAGES ───────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [api, web, scraper]
    steps:
    - uses: actions/checkout@v4

    - name: Log in to registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_PREFIX }}-${{ matrix.app }}
        tags: |
          type=sha,prefix={{branch}}-
          type=ref,event=branch
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: apps/${{ matrix.app }}/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ─── DEPLOY ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
    - uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v4

    - name: Configure kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

    - name: Deploy API
      run: |
        kubectl set image deployment/worldpulse-api \
          api=${{ env.IMAGE_PREFIX }}-api:${{ github.sha }} \
          -n worldpulse

    - name: Deploy Web
      run: |
        kubectl set image deployment/worldpulse-web \
          web=${{ env.IMAGE_PREFIX }}-web:${{ github.sha }} \
          -n worldpulse

    - name: Deploy Scraper
      run: |
        kubectl set image deployment/worldpulse-scraper \
          scraper=${{ env.IMAGE_PREFIX }}-scraper:${{ github.sha }} \
          -n worldpulse

    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/worldpulse-api -n worldpulse --timeout=5m
        kubectl rollout status deployment/worldpulse-web -n worldpulse --timeout=5m

    - name: Smoke test
      run: |
        sleep 15
        curl -f https://api.worldpulse.io/health || exit 1
        echo "✅ Deployment successful"

    - name: Notify on failure
      if: failure()
      run: |
        echo "⚠️ Deployment failed — initiating rollback"
        kubectl rollout undo deployment/worldpulse-api -n worldpulse
        kubectl rollout undo deployment/worldpulse-web -n worldpulse
