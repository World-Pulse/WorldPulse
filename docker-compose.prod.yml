version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  WorldPulse — Production Stack
#  Server: 142.93.71.102
#  Domains: world-pulse.io  |  world-pulse.app  (both live; .app → .io canonical)
#
#  First deploy — run from the project root on the server:
#    ./deploy.sh
#
#  Subsequent deploys:
#    ./deploy.sh
#  Rollback:
#    ./deploy.sh --rollback
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ─── DATABASES ─────────────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: wp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - wp_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: &default-logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7.4-alpine
    container_name: wp_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - wp_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging: *default-logging

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: wp_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_KEY}
      MEILI_ENV:        production
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    networks:
      - wp_net
    logging: *default-logging

  # ─── MESSAGE QUEUE ──────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: wp_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - wp_net
    logging: *default-logging

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: wp_kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS:                        PLAINTEXT://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS:              72
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - wp_net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging: *default-logging

  # ─── APPLICATIONS ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: worldpulse-api:latest
    container_name: wp_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      meilisearch:
        condition: service_started
    environment:
      NODE_ENV:         production
      PORT:             3001
      DATABASE_URL:     postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
      REDIS_URL:        redis://:${REDIS_PASSWORD}@redis:6379
      KAFKA_BROKERS:    kafka:29092
      MEILI_HOST:       http://meilisearch:7700
      MEILI_KEY:        ${MEILI_KEY}
      JWT_SECRET:       ${JWT_SECRET}
      CORS_ORIGINS:     https://world-pulse.io,https://www.world-pulse.io,https://world-pulse.app,https://www.world-pulse.app
      LOG_LEVEL:        info
      # Optional — email
      SMTP_HOST:        ${SMTP_HOST:-}
      SMTP_PORT:        ${SMTP_PORT:-587}
      SMTP_USER:        ${SMTP_USER:-}
      SMTP_PASS:        ${SMTP_PASS:-}
      EMAIL_FROM:       ${EMAIL_FROM:-noreply@world-pulse.io}
      # Optional — OAuth
      GITHUB_CLIENT_ID:     ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID:     ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # Optional — Web Push
      VAPID_PUBLIC_KEY:  ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      # Stripe billing
      STRIPE_SECRET_KEY:     ${STRIPE_SECRET_KEY:-}
      STRIPE_PRO_PRICE_ID:   ${STRIPE_PRO_PRICE_ID:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - wp_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    logging: *default-logging

  scraper:
    build:
      context: .
      dockerfile: apps/scraper/Dockerfile
    image: worldpulse-scraper:latest
    container_name: wp_scraper
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      NODE_ENV:           production
      DATABASE_URL:       postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
      REDIS_URL:          redis://:${REDIS_PASSWORD}@redis:6379
      KAFKA_BROKERS:      kafka:29092
      SCRAPE_INTERVAL_MS: ${SCRAPE_INTERVAL_MS:-30000}
      LOG_LEVEL:          info
      # Optional — LLM classification
      OPENAI_API_KEY:     ${OPENAI_API_KEY:-}
      LLM_API_URL:        ${LLM_API_URL:-}
      LLM_MODEL:          ${LLM_MODEL:-gpt-4o-mini}
    networks:
      - wp_net
    logging: *default-logging

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL:    https://api.world-pulse.io
        NEXT_PUBLIC_WS_URL:     wss://api.world-pulse.io
        NEXT_PUBLIC_MEILI_HOST: https://api.world-pulse.io/search
        NEXT_PUBLIC_MEILI_KEY:  ${MEILI_PUBLIC_KEY:-}
        NEXT_PUBLIC_VAPID_KEY:  ${VAPID_PUBLIC_KEY:-}
    image: worldpulse-web:latest
    container_name: wp_web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV:                   production
      PORT:                       3000
      NEXT_PUBLIC_API_URL:        https://api.world-pulse.io
      NEXT_PUBLIC_WS_URL:         wss://api.world-pulse.io
      NEXT_PUBLIC_MEILI_HOST:     https://api.world-pulse.io/search
      NEXT_PUBLIC_MEILI_KEY:      ${MEILI_PUBLIC_KEY}
      NEXT_PUBLIC_VAPID_KEY:      ${VAPID_PUBLIC_KEY:-}
    networks:
      - wp_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    logging: *default-logging

  # ─── REVERSE PROXY ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: wp_nginx
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./.certbot/www:/var/www/certbot:ro
      - ./.certbot/conf:/etc/letsencrypt:ro
      - uploads_data:/var/www/uploads:ro
    networks:
      - wp_net
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging

  certbot:
    image: certbot/certbot:latest
    container_name: wp_certbot
    restart: unless-stopped
    volumes:
      - ./.certbot/www:/var/www/certbot
      - ./.certbot/conf:/etc/letsencrypt
    # Checks renewal every 12h; Let's Encrypt only renews when < 30 days remain
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet --webroot -w /var/www/certbot && nginx -s reload 2>/dev/null || true; sleep 12h & wait $${!}; done'
    logging: *default-logging

  # ─── MONITORING ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: wp_prometheus
    restart: unless-stopped
    volumes:
      - ./infrastructure/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - wp_net
    logging: *default-logging

  grafana:
    image: grafana/grafana:11.2.0
    container_name: wp_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_SERVER_ROOT_URL:         https://world-pulse.io/grafana
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - wp_net
    depends_on:
      - prometheus
    logging: *default-logging

# ─── NETWORKS ──────────────────────────────────────────────────────────────────
networks:
  wp_net:
    driver: bridge

# ─── VOLUMES ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  meili_data:
  kafka_data:
  zookeeper_data:
  prometheus_data:
  grafana_data:
  uploads_data:
