<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WorldPulse Signal Verifier</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      min-height: 200px;
      background: #0f1117;
      color: #e8eaf0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: #161921;
      border-bottom: 1px solid #2a2d3a;
    }

    .logo {
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.8px;
      color: #4f9cf9;
      text-transform: uppercase;
    }

    .open-btn {
      font-size: 11px;
      color: #4f9cf9;
      text-decoration: none;
      border: 1px solid #2a2d3a;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .open-btn:hover { background: #1e2535; }

    #status-msg {
      font-size: 11px;
      color: #22c55e;
      padding: 4px 14px;
      min-height: 20px;
    }

    #signals-list {
      padding: 4px 0;
      max-height: 320px;
      overflow-y: auto;
    }

    .signal-card {
      display: block;
      padding: 9px 14px;
      text-decoration: none;
      color: #e8eaf0;
      border-bottom: 1px solid #1e2130;
    }

    .signal-card:last-child { border-bottom: none; }
    .signal-card:hover { background: #1a1e2c; }

    .signal-title {
      font-weight: 500;
      line-height: 1.35;
      margin-bottom: 5px;
      color: #f0f2f8;
    }

    .signal-meta {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 3px;
      text-transform: uppercase;
      color: #fff;
    }

    .reliability, .sources, .time {
      font-size: 11px;
      color: #9ca3af;
    }

    .time { color: #6b7280; }

    .empty, .loading, .error {
      padding: 20px 14px;
      color: #6b7280;
      text-align: center;
      font-size: 12px;
      line-height: 1.5;
    }

    .error { color: #ef4444; }

    footer {
      padding: 8px 14px;
      border-top: 1px solid #2a2d3a;
      background: #161921;
      text-align: right;
    }

    footer a {
      font-size: 11px;
      color: #4f9cf9;
      text-decoration: none;
    }

    footer a:hover { text-decoration: underline; }

    /* Settings panel */
    #settings-panel {
      padding: 12px 14px;
    }

    #settings-panel h3 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #f0f2f8;
    }

    #settings-panel label {
      display: block;
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 10px;
    }

    #settings-panel input[type="url"],
    #settings-panel input[type="password"] {
      display: block;
      width: 100%;
      margin-top: 3px;
      padding: 6px 8px;
      background: #1a1e2c;
      border: 1px solid #2a2d3a;
      border-radius: 4px;
      color: #e8eaf0;
      font-size: 12px;
    }

    #settings-panel input[type="url"]:focus,
    #settings-panel input[type="password"]:focus {
      outline: none;
      border-color: #4f9cf9;
    }

    .toggle {
      display: flex !important;
      align-items: center;
      gap: 8px;
      font-size: 12px !important;
      color: #e8eaf0 !important;
      cursor: pointer;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    .btn-row button {
      flex: 1;
      padding: 6px 0;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }

    #save-settings {
      background: #4f9cf9;
      color: #fff;
    }

    #save-settings:hover { background: #3b82f6; }

    #cancel-settings {
      background: #2a2d3a;
      color: #9ca3af;
    }

    #cancel-settings:hover { background: #343847; }
  </style>
</head>
<body>
  <header>
    <div class="logo">WorldPulse</div>
    <a class="open-btn" href="https://worldpulse.io" target="_blank" rel="noopener noreferrer">
      Open &rarr;
    </a>
  </header>

  <div id="status-msg"></div>

  <div id="signals-list">
    <div class="loading">Loading&hellip;</div>
  </div>

  <div id="settings-panel" hidden>
    <h3>Extension Settings</h3>
    <label>
      API URL
      <input id="api-url" type="url" placeholder="https://worldpulse.io">
    </label>
    <label>
      API Key <span style="color:#6b7280">(optional — for higher rate limits)</span>
      <input id="api-key" type="password" placeholder="wp_...">
    </label>
    <label class="toggle">
      <input id="enabled" type="checkbox"> Enable extension
    </label>
    <label class="toggle" style="margin-top:8px">
      <input id="show-on-select" type="checkbox"> Show popup on text selection
    </label>
    <div class="btn-row">
      <button id="save-settings">Save</button>
      <button id="cancel-settings">Cancel</button>
    </div>
  </div>

  <footer>
    <a id="settings-link" href="#">Settings</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
